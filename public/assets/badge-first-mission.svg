<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- First Mission — target/crosshair, cyan accent -->
  <circle cx="24" cy="24" r="22" stroke="#06b6d4" stroke-width="2" fill="#0a0f1a"/>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="16" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.6"/>
  <!-- Mid ring -->
  <circle cx="24" cy="24" r="10" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
  <!-- Bull's-eye -->
  <circle cx="24" cy="24" r="4" fill="#06b6d4"/>
  <!-- Crosshair lines -->
  <line x1="24" y1="2"  x2="24" y2="12" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="36" x2="24" y2="46" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2"  y1="24" x2="12" y2="24" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="24" x2="46" y2="24" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
