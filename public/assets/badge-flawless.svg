<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Flawless — diamond gem, teal accent -->
  <circle cx="24" cy="24" r="22" stroke="#2dd4bf" stroke-width="2" fill="#0a0f1a"/>
  <!-- Glow -->
  <circle cx="24" cy="24" r="16" fill="#2dd4bf" opacity="0.07"/>
  <!-- Diamond outline -->
  <polygon points="24,10 38,22 24,42 10,22" fill="#134e4a" stroke="#2dd4bf" stroke-width="1.5"/>
  <!-- Top facet (bright) -->
  <polygon points="24,10 38,22 24,24" fill="#99f6e4" opacity="0.55"/>
  <!-- Left facet -->
  <polygon points="24,10 10,22 24,24" fill="#0d9488" opacity="0.7"/>
  <!-- Horizontal divider -->
  <line x1="10" y1="22" x2="38" y2="22" stroke="#2dd4bf" stroke-width="0.75" opacity="0.7"/>
  <!-- Centre sparkle -->
  <circle cx="24" cy="18" r="1.2" fill="#f0fdfa" opacity="0.8"/>
</svg>
